            if (n.includes('석고보드') || ne === 'gypsum_board')
              return 'solid';
            // 코르크패널 — 패널형 매지
            if (n.includes('코르크패널') || (n.includes('코르크') && !n.includes('단열')))
              return 'panel';
            // 규산칼슘보드 — 한 판 (매지 없음)
            if (n.includes('규산칼슘') || ne.includes('calcium_silicate'))
              return 'solid';
            // 파티클보드 — 한 판 (매지 없음)
            if (n.includes('파티클보드') || ne === 'particle_board')
              return 'solid';
            // 흡음패널 — 한 판 (매지 없음)
            if (n.includes('흡음패널') || ne === 'acoustic_panel')
              return 'solid';
            // 폴리우레탄흡음재 — 한 판 (매지 없음)
            if (n.includes('폴리우레탄흡음') || ne === 'polyurethane_acoustic')
              return 'solid';
            // 대나무보드 — 한 판 (매지 없음)
            if (n.includes('대나무보드') || ne === 'bamboo_board')
              return 'solid';
            // 목모보드 — 한 판 (매지 없음)
            if (n.includes('목모') || ne === 'wood_wool_board')
              return 'solid';
            // 단열재 — 직전이 스터드면 studfill, 아니면 solid
            if (n.includes('그라스울') || n.includes('암면') || n.includes('양모') || n.includes('셀룰로오스') ||
                n.includes('헴프') || n.includes('목섬유') || n.includes('볏짚') || n.includes('코르크단열') ||
                n.includes('폴리우레탄흡음') ||
                ne.includes('glass_wool') || ne.includes('rock_wool') || ne.includes('wool_insulation') ||
                ne.includes('cellulose') || ne.includes('hemp') || ne.includes('wood_fiber') ||
                ne.includes('straw') || ne.includes('cork_insulation') || ne === 'polyurethane_acoustic') {
              // 앞뒤 레이어가 스터드인지 확인
              const prevL = index > 0 ? selectedLayers[index - 1] : null;
              const nextL = index + 1 < selectedLayers.length ? selectedLayers[index + 1] : null;
              const prevN = prevL ? (prevL.material.name || '').toLowerCase() : '';
              const nextN = nextL ? (nextL.material.name || '').toLowerCase() : '';
              if (prevN.includes('스틸스터드') || prevN.includes('목재스터드') ||
                  nextN.includes('스틸스터드') || nextN.includes('목재스터드')) return 'studfill';
              return 'solid';
            }
            // 단열재 (PF보드, 경질우레탄 등) — solid (면별 재질)
            if (n.includes('pf보드') || n.includes('경질우레탄') || n.includes('단열') || n.includes('보온판') || n.includes('볏짚') ||
                ne.includes('phenolic') || ne.includes('rigid_urethane') || ne.includes('insulation') || ne === 'xps' || ne === 'eps' ||
                ne.includes('wool') || ne.includes('cork_insulation') || ne.includes('straw') || ne.includes('cellulose') || ne.includes('hemp'))
              return 'solid';
            // 패널형 (GRC, UHPC, HPL, 섬유시멘트패널, 시멘트판넬, 시멘트보드)
            if ((n.includes('패널') || n.includes('판넬') || n.includes('보드')) &&
                !n.includes('코르크') && !n.includes('미네랄울'))
              return 'panel';
            // 아연판 — 세로 이음새
            if (n.includes('아연') && !n.includes('용융'))
              return 'zincseam';
            // 목재사이딩 — 사이딩(가로줄) 패턴
            if (n.includes('목재사이딩'))
              return 'siding';
            // 금속 시트 (한 판 + 에지)
            if (n.includes('알루미늄') || n.includes('동판') || n.includes('재활용알루미늄') ||
                ne.includes('aluminum') || ne.includes('copper'))
              return 'metalsheet';
            // 도포형
            if (n.includes('미장') || n.includes('페인트') || n.includes('모르타르') || n.includes('석회') ||
                ne.includes('plaster') || ne.includes('paint') || ne.includes('mortar') || ne.includes('lime'))
              return 'coat';
            // 나머지 전부 solid (강판, 폴리카보네이트, 아크릴, 콘크리트, CLT, 합판, OSB, 코르크패널,
            //   미네랄울샌드위치패널, 대나무, 단열재 등)
            return 'solid';
          }

          const wp = getWallPattern();

          // 에지 와이어프레임 헬퍼
          function addEdges(parentMesh, geo) {
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2, opacity: 0.4, transparent: true }));
            parentMesh.add(line);
          }

          if (wp === 'brick') {
            // 벽돌/블록 — 러닝본드, 단변 균등분할
            const brickGroup = new THREE.Group();
            const bH = n.includes('블록') || n.includes('alc') || n.includes('대마') || ne.includes('block') || ne.includes('alc') || ne.includes('hempcrete') || ne.includes('adobe') ? 0.2 : 0.057;
            const bW = bH < 0.1 ? 0.19 : 0.4;
            const gap = 0.008;
            const cols = Math.max(1, Math.round(wallW / (bW + gap)));
            const actualBW = (wallW - (cols - 1) * gap) / cols;
            const rows = Math.ceil(wallH / (bH + gap));
            for (let r = 0; r < rows; r++) {
              const offset = (r % 2 === 1) ? (actualBW + gap) / 2 : 0;
              for (let c = -1; c <= cols; c++) {
                const z = -wallW/2 + c * (actualBW + gap) + actualBW/2 + offset;
                const y = -wallH/2 + r * (bH + gap) + bH/2;
                if (z - actualBW/2 > wallW/2 || z + actualBW/2 < -wallW/2) continue;
                if (y - bH/2 > wallH/2) continue;
                const clipL = Math.max(z - actualBW/2, -wallW/2);
                const clipR = Math.min(z + actualBW/2, wallW/2);
                const clipB = Math.max(y - bH/2, -wallH/2);
                const clipT = Math.min(y + bH/2, wallH/2);
                const cw = clipR - clipL;
                const ch = clipT - clipB;
                if (cw < 0.01 || ch < 0.01) continue;
                const geo = new THREE.BoxGeometry(thickness, ch, cw);
                const b = new THREE.Mesh(geo, floorMat);
                b.position.set(pos - thickness/2, (clipB + clipT)/2, (clipL + clipR)/2);
                b.castShadow = true;
                brickGroup.add(b);
              }
            }
            pos -= thickness;
            group3D.add(brickGroup);
            layerMeshes.push(brickGroup);
          } else if (wp === 'tile') {
            // 타일 그리드 — 단변 균등분할
            const tileGroup = new THREE.Group();
            const isGlassBlock = n.includes('유리블록');
            const tSize = n.includes('모자이크') ? 0.025 : isGlassBlock ? 0.19 : 0.3;
            const gap = n.includes('모자이크') ? 0.003 : 0.005;
            const cols = Math.max(1, Math.round(wallW / (tSize + gap)));
            const actualTW = (wallW - (cols - 1) * gap) / cols;
            const rows = Math.max(1, Math.round(wallH / (isGlassBlock ? actualTW + gap : tSize + gap)));
            const actualTH = (wallH - (rows - 1) * gap) / rows;
            for (let r = 0; r < rows; r++) {
              for (let c = 0; c < cols; c++) {
                const y = -wallH/2 + r * (actualTH + gap) + actualTH/2;
                const z = -wallW/2 + c * (actualTW + gap) + actualTW/2;
                const geo = new THREE.BoxGeometry(thickness, actualTH, actualTW);
                const t = new THREE.Mesh(geo, floorMat);
                t.position.set(pos - thickness/2, y, z);
                t.castShadow = true;
                tileGroup.add(t);
              }
            }
            pos -= thickness;
            group3D.add(tileGroup);
            layerMeshes.push(tileGroup);
          } else if (wp === 'siding') {
            // 사이딩 — 높이 균등분할, 단면 대각선 (사다리꼴)
            const sidingGroup = new THREE.Group();
            const boardH = n.includes('테라코타') ? 0.3 : 0.18;
            const gap = 0.005;
            const rows = Math.max(1, Math.round(wallH / (boardH + gap)));
            const actualBH = (wallH - (rows - 1) * gap) / rows;
            const t = thickness;
            const tiltOff = t * 0.7; // 하단이 상단보다 70% 두께만큼 돌출
            for (let r = 0; r < rows; r++) {
              const y = -wallH/2 + r * (actualBH + gap);
              const hw = wallW / 2;
              const x0 = pos;                // 뒷면 (벽쪽)
              const x1 = pos - t - tiltOff;  // 하단 앞면 (더 돌출, 두꺼운쪽)
              const x2 = pos - t;            // 상단 앞면 (얇은쪽)
              // 사다리꼴 단면 x 전폭 wallW — BufferGeometry
              const geo = new THREE.BufferGeometry();
              // 8개 꼭짓점: 하단뒤, 하단앞, 상단앞(돌출), 상단뒤 × z양쪽
              const verts = new Float32Array([
                x0, y, -hw,             // 0: 하단뒤좌
                x1, y, -hw,             // 1: 하단앞좌
                x2, y+actualBH, -hw,    // 2: 상단앞좌
                x0, y+actualBH, -hw,    // 3: 상단뒤좌
                x0, y, hw,              // 4: 하단뒤우
                x1, y, hw,              // 5: 하단앞우
                x2, y+actualBH, hw,     // 6: 상단앞우
                x0, y+actualBH, hw,     // 7: 상단뒤우
              ]);
              const indices = [
                // 앞면 (기울어진 면)
                1,5,6, 1,6,2,
                // 뒷면
                4,0,3, 4,3,7,
                // 상면
                3,2,6, 3,6,7,
                // 하면
                0,4,5, 0,5,1,
                // 좌측면
                0,1,2, 0,2,3,
                // 우측면
                5,4,7, 5,7,6,
              ];
              geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
              geo.setIndex(indices);
              geo.computeVertexNormals();
              const s = new THREE.Mesh(geo, floorMat);
              s.castShadow = true;
              sidingGroup.add(s);
            }
            pos -= thickness;
            group3D.add(sidingGroup);
            layerMeshes.push(sidingGroup);
          } else if (wp === 'stone') {
            // 석재 — 러닝본드 1/3 오프셋, 단변 균등분할
            const stoneGroup = new THREE.Group();
            const sH = 0.4, sW = 0.6, gap = 0.004;
            const cols = Math.max(1, Math.round(wallW / (sW + gap)));
            const actualSW = (wallW - (cols - 1) * gap) / cols;
            const rows = Math.ceil(wallH / (sH + gap));
            for (let r = 0; r < rows; r++) {
              const offset = (r % 2 === 1) ? (actualSW + gap) / 3 : 0;
              for (let c = -1; c <= cols; c++) {
                const y = -wallH/2 + r * (sH + gap) + sH/2;
                const z = -wallW/2 + c * (actualSW + gap) + actualSW/2 + offset;
                const clipL = Math.max(z - actualSW/2, -wallW/2);
                const clipR = Math.min(z + actualSW/2, wallW/2);
                const clipB = Math.max(y - sH/2, -wallH/2);
                const clipT = Math.min(y + sH/2, wallH/2);
                const cw = clipR - clipL;
                const ch = clipT - clipB;
                if (cw < 0.01 || ch < 0.01) continue;
                const geo = new THREE.BoxGeometry(thickness, ch, cw);
                const s = new THREE.Mesh(geo, floorMat);
                s.position.set(pos - thickness/2, (clipB + clipT)/2, (clipL + clipR)/2);
                s.castShadow = true;
                stoneGroup.add(s);
              }
            }
            pos -= thickness;
            group3D.add(stoneGroup);
            layerMeshes.push(stoneGroup);
          } else if (wp === 'panel') {
            // 패널형 — 단변 균등분할
            const panelGroup = new THREE.Group();
            const pH = 1.0, pW = 0.6, gap = 0.006;
            const cols = Math.max(1, Math.round(wallW / (pW + gap)));
            const actualPW = (wallW - (cols - 1) * gap) / cols;
            const rows = Math.ceil(wallH / (pH + gap));
            for (let r = 0; r < rows; r++) {
              for (let c = 0; c < cols; c++) {
                const y = -wallH/2 + r * (pH + gap) + pH/2;
                const z = -wallW/2 + c * (actualPW + gap) + actualPW/2;
                const clipB = Math.max(y - pH/2, -wallH/2);
                const clipT = Math.min(y + pH/2, wallH/2);
                const ch = clipT - clipB;
                if (ch < 0.01) continue;
                const geo = new THREE.BoxGeometry(thickness, ch, actualPW);
                const p = new THREE.Mesh(geo, floorMat);
                p.position.set(pos - thickness/2, (clipB + clipT)/2, z);
                p.castShadow = true;
                panelGroup.add(p);
              }
            }
            pos -= thickness;
            group3D.add(panelGroup);
            layerMeshes.push(panelGroup);
          } else if (wp === 'woodboard') {
            // 목재 세로 널빤지 — 단변 균등분할
            const woodGroup = new THREE.Group();
            const bW = 0.15;
            const gap = 0.004;
            const cols = Math.max(1, Math.round(wallW / (bW + gap)));
            const actualBW = (wallW - (cols - 1) * gap) / cols;
            for (let c = 0; c < cols; c++) {
              const z = -wallW/2 + c * (actualBW + gap) + actualBW/2;
              const geo = new THREE.BoxGeometry(thickness, wallH, actualBW);
              const b = new THREE.Mesh(geo, floorMat);
              b.position.set(pos - thickness/2, 0, z);
              b.castShadow = true;
              woodGroup.add(b);
            }
            pos -= thickness;
            group3D.add(woodGroup);
            layerMeshes.push(woodGroup);
          } else if (wp === 'zincseam') {
            // 아연판 — 징크패널 세로 이음새, 단변 균등분할
            const zincGroup = new THREE.Group();
            const seamW = 0.43;
            const seamGap = 0.003;
            const cols = Math.max(1, Math.round(wallW / (seamW + seamGap)));
            const actualSeamW = (wallW - (cols - 1) * seamGap) / cols;
            for (let c = 0; c < cols; c++) {
              const z = -wallW/2 + c * (actualSeamW + seamGap) + actualSeamW/2;
              const geo = new THREE.BoxGeometry(thickness, wallH, actualSeamW);
              const panel = new THREE.Mesh(geo, floorMat);
              panel.position.set(pos - thickness/2, 0, z);
              panel.castShadow = true;
              zincGroup.add(panel);
              if (c < cols - 1) {
                const seamZ = z + actualSeamW/2 + seamGap/2;
                const seamGeo = new THREE.PlaneGeometry(wallH, thickness * 1.2);
                const seamMat = new THREE.MeshBasicMaterial({ color: 0x606060, side: THREE.DoubleSide });
                const seam = new THREE.Mesh(seamGeo, seamMat);
                seam.rotation.z = Math.PI / 2;
                seam.rotation.y = Math.PI / 2;
                seam.position.set(pos - thickness/2, 0, seamZ);
                zincGroup.add(seam);
              }
            }
            pos -= thickness;
            group3D.add(zincGroup);
            layerMeshes.push(zincGroup);
          } else if (wp === 'sandwich') {
            // 미네랄울샌드위치패널 — 외판 + 단열재 + 내판
            const sandGroup = new THREE.Group();
            const skinT = 0.003; // 내외판 3mm
            const coreT = thickness - skinT * 2; // 중간 단열재
            const seamW = 0.15; // 매지 간격
            const seamT = 0.001; // 매지 두께
            // 금속판 재질 (아이보리 매트)
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xf0ead8, roughness: 0.65, metalness: 0.35 });
            // 황토색 단열재 재질
            const coreMat = new THREE.MeshStandardMaterial({ color: 0xd4a850, roughness: 0.9, metalness: 0.0 });
            // 매지 재질
            const seamMat = new THREE.MeshBasicMaterial({ color: 0x404040, side: THREE.DoubleSide });

            // 외판 (바깥, +X 쪽)
            const outerSkin = new THREE.Mesh(
              new THREE.BoxGeometry(skinT, wallH, wallW), skinMat
            );
            outerSkin.position.set(pos - skinT/2, 0, 0);
            outerSkin.castShadow = true;
            sandGroup.add(outerSkin);

            // 외판 세로 매지
            const cols = Math.floor(wallW / seamW);
            for (let c = 1; c < cols; c++) {
              const z = -wallW/2 + c * seamW;
              const sg = new THREE.PlaneGeometry(wallH, skinT * 2);
              const sm = new THREE.Mesh(sg, seamMat);
              sm.rotation.z = Math.PI / 2;
              sm.rotation.y = Math.PI / 2;
              sm.position.set(pos - skinT/2, 0, z);
              sandGroup.add(sm);
            }

            // 중간 단열재
            const core = new THREE.Mesh(
              new THREE.BoxGeometry(coreT, wallH, wallW), coreMat
            );
            core.position.set(pos - skinT - coreT/2, 0, 0);
            core.castShadow = true;
            sandGroup.add(core);

            // 내판 (안쪽, -X 쪽)
            const innerSkin = new THREE.Mesh(
              new THREE.BoxGeometry(skinT, wallH, wallW), skinMat
            );
            innerSkin.position.set(pos - skinT - coreT - skinT/2, 0, 0);
            innerSkin.castShadow = true;
            sandGroup.add(innerSkin);

            // 내판 세로 매지
            for (let c = 1; c < cols; c++) {
              const z = -wallW/2 + c * seamW;
              const sg = new THREE.PlaneGeometry(wallH, skinT * 2);
              const sm = new THREE.Mesh(sg, seamMat);
              sm.rotation.z = Math.PI / 2;
              sm.rotation.y = Math.PI / 2;
              sm.position.set(pos - skinT - coreT - skinT/2, 0, z);
              sandGroup.add(sm);
            }

            pos -= thickness;
            group3D.add(sandGroup);
            layerMeshes.push(sandGroup);
          } else if (wp === 'studframe') {
            // 스틸스터드/목재스터드 — C채널 수직 프레임
            // 다음 레이어(단열재)의 두께에 따라 스터드 깊이 결정
            const studGroup = new THREE.Group();
            const isSteel = n.includes('스틸') || ne === 'steel_stud';
            const studMat = floorMat;
            const studW = isSteel ? 0.04 : 0.038;   // 스터드 폭 (플랜지)
            // 다음 레이어 단열재 두께 찾기
            let nextInsulThick = 0;
            for (let ni = index + 1; ni < selectedLayers.length; ni++) {
              const nm = (selectedLayers[ni].material.name || '').toLowerCase();
              const nen = (selectedLayers[ni].material.nameEn || '').toLowerCase();
              if (nm.includes('단열') || nm.includes('그라스울') || nm.includes('암면') || nm.includes('볏짚') ||
                  nm.includes('셀룰로오스') || nm.includes('헴프') || nm.includes('양모') || nm.includes('목섬유') ||
                  nm.includes('코르크단열') || nm.includes('폴리우레탄흡음') ||
                  nen.includes('insulation') || nen.includes('glass_wool') || nen.includes('rock_wool') ||
                  nen.includes('straw') || nen.includes('cellulose') || nen.includes('hemp') ||
                  nen.includes('wool') || nen.includes('wood_fiber') || nen.includes('polyurethane_acoustic')) {
                nextInsulThick = selectedLayers[ni].thickness / 1000;
                break;
              }
            }
            // 앞뒤 레이어에서 단열재 두께 찾기 (순서 무관)
            if (nextInsulThick === 0) {
              for (let ni = index - 1; ni >= 0; ni--) {
                const nm = (selectedLayers[ni].material.name || '').toLowerCase();
                const nen = (selectedLayers[ni].material.nameEn || '').toLowerCase();
                if (nm.includes('단열') || nm.includes('그라스울') || nm.includes('암면') || nm.includes('볏짚') ||
                    nm.includes('셀룰로오스') || nm.includes('헴프') || nm.includes('양모') || nm.includes('목섬유') ||
                    nm.includes('코르크단열') || nm.includes('폴리우레탄흡음') ||
                    nen.includes('insulation') || nen.includes('glass_wool') || nen.includes('rock_wool') ||
                    nen.includes('straw') || nen.includes('cellulose') || nen.includes('hemp') ||
                    nen.includes('wool') || nen.includes('wood_fiber') || nen.includes('polyurethane_acoustic')) {
                  nextInsulThick = selectedLayers[ni].thickness / 1000;
                  break;
                }
                break; // 직전만 체크
              }
            }
            const studD = nextInsulThick > 0 ? nextInsulThick : (isSteel ? 0.075 : 0.089);
            const studT = isSteel ? 0.001 : studW;  // 두께 (강재 얇음 / 목재=폭과 동일)
            const runnerH = isSteel ? 0.03 : 0.038; // 러너 높이
            const braceH = isSteel ? 0.025 : 0.03;  // 보강채널 높이
            const studSpacing = 0.4; // 400mm 간격
            const studCount = Math.max(2, Math.round(wallW / studSpacing) + 1);
            const actualSpacing = wallW / (studCount - 1);
            // 직전이 studfill이면 그 위치에 맞추기 (단열재가 먼저 온 경우)
            const prevIsInsul = index > 0 && (() => {
              const pm = (selectedLayers[index-1].material.name||'').toLowerCase();
              const pe = (selectedLayers[index-1].material.nameEn||'').toLowerCase();
              return pm.includes('그라스울') || pm.includes('암면') || pm.includes('양모') ||
                pm.includes('셀룰로오스') || pm.includes('헴프') || pm.includes('목섬유') ||
                pm.includes('볏짚') || pm.includes('코르크단열') || pm.includes('폴리우레탄흡음') ||
                pe.includes('glass_wool') || pe.includes('rock_wool') || pe.includes('insulation') ||
                pe.includes('straw') || pe.includes('cellulose') || pe.includes('hemp') ||
                pe.includes('wool') || pe.includes('wood_fiber') || pe === 'polyurethane_acoustic';
            })();
            const cx = prevIsInsul ? pos + studD / 2 : pos - studD / 2;

            // 수직 스터드 (C채널 또는 각재)
            for (let i = 0; i < studCount; i++) {
              const z = -wallW / 2 + i * actualSpacing;
              if (isSteel) {
                // C채널: 웹(뒷판) + 플랜지 2개
                // 웹
                const web = new THREE.Mesh(
                  new THREE.BoxGeometry(studT, wallH - runnerH * 2, studW), studMat
                );
                web.position.set(cx - studD/2 + studT/2, 0, z);
                web.castShadow = true;
                studGroup.add(web);
                // 앞 플랜지
                const f1 = new THREE.Mesh(
                  new THREE.BoxGeometry(studD, wallH - runnerH * 2, studT), studMat
                );
                f1.position.set(cx, 0, z + studW/2 - studT/2);
                f1.castShadow = true;
                studGroup.add(f1);
                // 뒤 플랜지
                const f2 = new THREE.Mesh(
                  new THREE.BoxGeometry(studD, wallH - runnerH * 2, studT), studMat
                );
                f2.position.set(cx, 0, z - studW/2 + studT/2);
                f2.castShadow = true;
                studGroup.add(f2);
              } else {
                // 목재: 단순 각재
                const stud = new THREE.Mesh(
                  new THREE.BoxGeometry(studD, wallH - runnerH * 2, studW), studMat
                );
                stud.position.set(cx, 0, z);
                stud.castShadow = true;
                studGroup.add(stud);
              }
            }

            // 상부 러너 (U채널 또는 깔도리)
            const topRunner = new THREE.Mesh(
              new THREE.BoxGeometry(studD, runnerH, wallW), studMat
            );
            topRunner.position.set(cx, wallH/2 - runnerH/2, 0);
            topRunner.castShadow = true;
            studGroup.add(topRunner);

            // 하부 러너
            const botRunner = new THREE.Mesh(
              new THREE.BoxGeometry(studD, runnerH, wallW), studMat
            );
            botRunner.position.set(cx, -wallH/2 + runnerH/2, 0);
            botRunner.castShadow = true;
            studGroup.add(botRunner);

            // 중간 보강채널
            const brace = new THREE.Mesh(
              new THREE.BoxGeometry(studD * 0.6, braceH, wallW), studMat
            );
            brace.position.set(cx, 0, 0);
            brace.castShadow = true;
            studGroup.add(brace);

            // 인접 단열재가 있으면 pos를 여기서 빼지 않음 (studfill에서 통합)
            const prevL2 = index > 0 ? selectedLayers[index - 1] : null;
            const nextL = index + 1 < selectedLayers.length ? selectedLayers[index + 1] : null;
            const prevN2 = prevL2 ? (prevL2.material.name || '').toLowerCase() : '';
            const nextN = nextL ? (nextL.material.name || '').toLowerCase() : '';
            const nextNe = nextL ? (nextL.material.nameEn || '').toLowerCase() : '';
            const prevNe2 = prevL2 ? (prevL2.material.nameEn || '').toLowerCase() : '';
            function isInsul(nm, nen) {
              return nm.includes('그라스울') || nm.includes('암면') || nm.includes('양모') ||
                nm.includes('셀룰로오스') || nm.includes('헴프') || nm.includes('목섬유') ||
                nm.includes('볏짚') || nm.includes('코르크단열') || nm.includes('폴리우레탄흡음') ||
                nen.includes('glass_wool') || nen.includes('rock_wool') || nen.includes('insulation') ||
                nen.includes('straw') || nen.includes('cellulose') || nen.includes('hemp') ||
                nen.includes('wool') || nen.includes('wood_fiber') || nen === 'polyurethane_acoustic';
            }
            const hasNextInsul = isInsul(nextN, nextNe);
            const hasPrevInsul = isInsul(prevN2, prevNe2);
            if (!hasNextInsul && !hasPrevInsul) pos -= studD;
            // 직전이 단열재면 이미 pos가 빠져있으므로 추가로 빼지 않음
            group3D.add(studGroup);
            layerMeshes.push(studGroup);
          } else if (wp === 'studfill') {
            // 단열재 — 인접 스터드 프레임 사이 충진 (앞뒤 모두 체크)
            const fillGroup = new THREE.Group();
            const prevLayer = index > 0 ? selectedLayers[index - 1] : null;
            const nextLayer = index + 1 < selectedLayers.length ? selectedLayers[index + 1] : null;
            const prevName = prevLayer ? (prevLayer.material.name || '').toLowerCase() : '';
            const nextName = nextLayer ? (nextLayer.material.name || '').toLowerCase() : '';
            const isStudPrev = prevName.includes('스틸스터드') || prevName.includes('목재스터드');
            const isStudNext = nextName.includes('스틸스터드') || nextName.includes('목재스터드');
            const hasStud = isStudPrev || isStudNext;
            const studName = isStudPrev ? prevName : nextName;
            const isSteel = studName.includes('스틸');
            const fStudD = thickness; // 단열재 두께 = 스터드 깊이
            const fStudW = hasStud ? (isSteel ? 0.04 : 0.038) : 0;
            const fRunnerH = hasStud ? (isSteel ? 0.03 : 0.038) : 0;
            const fStudSpacing = 0.4;
            const fStudCount = hasStud ? Math.max(2, Math.round(wallW / fStudSpacing) + 1) : 0;
            const fActualSpacing = hasStud ? wallW / (fStudCount - 1) : wallW;

            if (hasStud && fStudCount > 1) {
              // 스터드 사이사이에 단열재 블록 배치 (보강채널로 상하 분리)
              const fBraceH = isSteel ? 0.025 : 0.03;
              const fillHTotal = wallH - fRunnerH * 2;
              const fillHUpper = (fillHTotal - fBraceH) / 2;
              const fillHLower = (fillHTotal - fBraceH) / 2;
              const fillX = pos - fStudD / 2;
              for (let i = 0; i < fStudCount - 1; i++) {
                const z1 = -wallW / 2 + i * fActualSpacing + fStudW / 2;
                const z2 = -wallW / 2 + (i + 1) * fActualSpacing - fStudW / 2;
                const fillW = z2 - z1;
                if (fillW < 0.01) continue;
                // 상부 블록
                const geoUp = new THREE.BoxGeometry(fStudD * 0.95, fillHUpper, fillW);
                const fillUp = new THREE.Mesh(geoUp, floorMat);
                fillUp.position.set(fillX, fBraceH / 2 + fillHUpper / 2, (z1 + z2) / 2);
                fillUp.castShadow = true;
                fillGroup.add(fillUp);
                // 하부 블록
                const geoDown = new THREE.BoxGeometry(fStudD * 0.95, fillHLower, fillW);
                const fillDown = new THREE.Mesh(geoDown, floorMat);
                fillDown.position.set(fillX, -fBraceH / 2 - fillHLower / 2, (z1 + z2) / 2);
                fillDown.castShadow = true;
                fillGroup.add(fillDown);
              }
              pos -= thickness;
            } else {
              // 스터드 없으면 일반 한 판
              geometry = new THREE.BoxGeometry(thickness, wallH, wallW);
              const fill = new THREE.Mesh(geometry, floorMat);
              fill.position.x = pos - thickness / 2;
              fill.castShadow = true;
              fillGroup.add(fill);
              pos -= thickness;
            }
            group3D.add(fillGroup);
            layerMeshes.push(fillGroup);
          } else if (wp === 'metalsheet') {
            // 금속 시트 — 한 판 + 에지
            geometry = new THREE.BoxGeometry(thickness, wallH, wallW);
            mesh = new THREE.Mesh(geometry, floorMat);
            mesh.position.x = pos - thickness / 2;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            addEdges(mesh, geometry);
            pos -= thickness;
            group3D.add(mesh);
            layerMeshes.push(mesh);
          } else if (n.includes('폴리우레탄흡음') || ne === 'polyurethane_acoustic') {
            // 폴리우레탄흡음재 — 에그크레이트 울퉁불퉁 표면
            const foamGroup = new THREE.Group();
            // 베이스 판
            const baseT = thickness * 0.4;
            const baseGeo = new THREE.BoxGeometry(baseT, wallH, wallW);
            const baseMesh = new THREE.Mesh(baseGeo, floorMat);
            baseMesh.position.set(pos - thickness + baseT/2, 0, 0);
            baseMesh.castShadow = true;
            foamGroup.add(baseMesh);
            // 반구 돌기 (앞면에 에그크레이트 패턴)
            const bumpR = 0.04;
            const bumpSpacing = bumpR * 2.2;
            const bumpX = pos - thickness + baseT;
            for (let y = -wallH/2 + bumpSpacing; y < wallH/2; y += bumpSpacing) {
              for (let z = -wallW/2 + bumpSpacing; z < wallW/2; z += bumpSpacing) {
                const sphere = new THREE.Mesh(
                  new THREE.SphereGeometry(bumpR, 8, 6, 0, Math.PI),
                  floorMat
                );
                sphere.rotation.y = Math.PI / 2;
                sphere.rotation.x = Math.PI;
                sphere.position.set(bumpX + bumpR * 0.3, y, z);
                foamGroup.add(sphere);
              }
            }
            pos -= thickness;
            group3D.add(foamGroup);
            layerMeshes.push(foamGroup);
          } else {
            // solid, coat, insulation 등 — 한 판 + 에지
            const isPFOrUrethane = n.includes('pf보드') || n.includes('경질우레탄') ||
              ne.includes('phenolic') || ne.includes('rigid_urethane');
            geometry = new THREE.BoxGeometry(thickness, wallH, wallW);
            if (isPFOrUrethane) {
              // 전후면(+X,-X): 은박/부직포(floorMat), 나머지 4면: 노란색 단열재
              const sideTexW = insulYellowTex(); sideTexW.repeat.set(2,4);
              const sideMat = new THREE.MeshStandardMaterial({ map: sideTexW, roughness: 0.85, metalness: 0.0 });
              mesh = new THREE.Mesh(geometry, [floorMat, floorMat, sideMat, sideMat, sideMat, sideMat]);
            } else {
              mesh = new THREE.Mesh(geometry, floorMat);
            }
            mesh.position.x = pos - thickness / 2;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            addEdges(mesh, geometry);
            pos -= thickness;
            group3D.add(mesh);
            layerMeshes.push(mesh);
          }
        }
        // 판재형 (마루, 데크) — 가로 널빤지 + 줄눈
        else if (pattern === 'plank') {
          const plankGroup = new THREE.Group();
          const plankW = 0.15;  // 널빤지 폭
          const gap = 0.003;
          const count = Math.ceil(floorD / (plankW + gap));
          const offset = (floorD - count * (plankW + gap) + gap) / 2;
          for (let i = 0; i < count; i++) {
            const pw = (i === count - 1) ? Math.min(plankW, floorD - offset - i * (plankW + gap)) : plankW;
            if (pw < 0.01) continue;
            const plank = new THREE.Mesh(new THREE.BoxGeometry(floorW, thickness, pw), floorMat);
            const z = -floorD/2 + offset + i * (plankW + gap) + pw/2;
            plank.position.set(0, pos + thickness/2, z);
            plank.castShadow = true;
            plank.receiveShadow = true;
            plankGroup.add(plank);
          }
          group3D.add(plankGroup);
          layerMeshes.push(plankGroup);
          pos += thickness;
        }
        // 타일형 — 단변 등분, 장변은 floorW 채움
        else if (pattern === 'tile') {
          const tileGroup = new THREE.Group();
          const tGap = 0.004;
          const approxSize = matName.includes('카펫') ? 0.5 : 0.3;
          const rowCount = Math.round(floorD / (approxSize + tGap));
          const tSize = (floorD - tGap * (rowCount - 1)) / rowCount;
          const colCount = Math.ceil(floorW / (tSize + tGap));
          for (let r = 0; r < rowCount; r++) {
            for (let c = 0; c < colCount; c++) {
              const cx = -floorW/2 + c * (tSize + tGap) + tSize/2;
              const z = -floorD/2 + r * (tSize + tGap) + tSize/2;
              const left = Math.max(cx - tSize/2, -floorW/2);
              const right = Math.min(cx + tSize/2, floorW/2);
              const tw = right - left;
              if (tw < 0.01) continue;
              const tile = new THREE.Mesh(new THREE.BoxGeometry(tw, thickness, tSize), floorMat);
              tile.position.set((left+right)/2, pos + thickness/2, z);
              tile.castShadow = true;
              tile.receiveShadow = true;
              tileGroup.add(tile);
            }
          }
          group3D.add(tileGroup);
          layerMeshes.push(tileGroup);
          pos += thickness;
        }
        // 석재 슬라브형 — 단변 등분, 장변은 floorW 채움
        else if (pattern === 'slab') {
          const slabGroup = new THREE.Group();
          const sGap = 0.003;
          const approxS = 0.4;
          const rowCount = Math.round(floorD / (approxS + sGap));
          const sSize = (floorD - sGap * (rowCount - 1)) / rowCount;
          const colCount = Math.ceil(floorW / (sSize + sGap));
          for (let r = 0; r < rowCount; r++) {
            for (let c = 0; c < colCount; c++) {
              const cx = -floorW/2 + c * (sSize + sGap) + sSize/2;
              const z = -floorD/2 + r * (sSize + sGap) + sSize/2;
              const left = Math.max(cx - sSize/2, -floorW/2);
              const right = Math.min(cx + sSize/2, floorW/2);
              const tw = right - left;
              if (tw < 0.01) continue;
              const slab = new THREE.Mesh(new THREE.BoxGeometry(tw, thickness, sSize), floorMat);
              slab.position.set((left+right)/2, pos + thickness/2, z);
              slab.castShadow = true;
              slab.receiveShadow = true;
              slabGroup.add(slab);
            }
          }
          group3D.add(slabGroup);
          layerMeshes.push(slabGroup);
          pos += thickness;
        }
        // 이중바닥재 — 패널 + 지지대
        else if (pattern === 'raised') {
          const rGroup = new THREE.Group();
          const pedH = 0.1;  // 지지대 높이 100mm
          const pGap = 0.006, panelThick = thickness * 0.6;
          // 단변 등분, 장변은 floorW 채움
          const approxPanel = 0.58;
          const rowCount = Math.round(floorD / (approxPanel + pGap));
          const panelSize = (floorD - pGap * (rowCount - 1)) / rowCount;
          const colCount = Math.ceil(floorW / (panelSize + pGap));
          // 지지대 (베이스 + 기둥 + 헤드)
          const pedMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.7 });
          for (let r = 0; r <= rowCount; r++) {
            for (let c = 0; c <= colCount; c++) {
              const x = Math.min(-floorW/2 + c * (panelSize + pGap), floorW/2);
              const z = -floorD/2 + Math.min(r, rowCount - 1) * (panelSize + pGap) + (r === rowCount ? panelSize : 0);
              // 베이스 플레이트
              const base = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.028, 0.008, 12), pedMat);
              base.position.set(x, pos + 0.004, z);
              rGroup.add(base);
              // 기둥 (나사봉)
              const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, pedH - 0.02, 8), pedMat);
              shaft.position.set(x, pos + 0.008 + (pedH - 0.02)/2, z);
              rGroup.add(shaft);
              // 헤드 플레이트
              const head = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.022, 0.012, 12), pedMat);
              head.position.set(x, pos + pedH - 0.006, z);
              rGroup.add(head);
            }
          }
          // 패널
          for (let r = 0; r < rowCount; r++) {
            for (let c = 0; c < colCount; c++) {
              const cx = -floorW/2 + c * (panelSize + pGap) + panelSize/2;
              const z = -floorD/2 + r * (panelSize + pGap) + panelSize/2;
              const left = Math.max(cx - panelSize/2, -floorW/2);
              const right = Math.min(cx + panelSize/2, floorW/2);
              const tw = right - left;
              if (tw < 0.01) continue;
              const panel = new THREE.Mesh(new THREE.BoxGeometry(tw, panelThick, panelSize), floorMat);
              panel.position.set((left+right)/2, pos + pedH + panelThick/2, z);
              panel.castShadow = true;
              rGroup.add(panel);
            }
          }
          group3D.add(rGroup);
          layerMeshes.push(rGroup);
          pos += pedH + panelThick;
        }
        // 단열재 — 한 판 (그리드 없음)
        else if (pattern === 'board') {
          const isPFOrUrethane = matName.includes('pf보드') || matName.includes('경질우레탄') ||
            nameEn.includes('phenolic') || nameEn.includes('rigid_urethane');
          if (isPFOrUrethane) {
            // 상하면: 은박/부직포(floorMat), 측면 4면: 노란색 단열재
            const sideTexY = insulYellowTex(); sideTexY.repeat.set(4,1);
            const sideMat = new THREE.MeshStandardMaterial({ map: sideTexY, roughness: 0.85, metalness: 0.0 });
            // BoxGeometry 면 순서: +X, -X, +Y, -Y, +Z, -Z
            const mats = [sideMat, sideMat, floorMat, floorMat, sideMat, sideMat];
            geometry = new THREE.BoxGeometry(floorW, thickness, floorD);
            mesh = new THREE.Mesh(geometry, mats);
          } else {
            geometry = new THREE.BoxGeometry(floorW, thickness, floorD);
            mesh = new THREE.Mesh(geometry, floorMat);
          }
          mesh.position.y = pos + thickness / 2;
          mesh.castShadow = true;
          mesh.receiveShadow = true;

          const edges = new THREE.EdgesGeometry(geometry);
          const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2, opacity: 0.4, transparent: true }));
          mesh.add(line);

          pos += thickness;
          group3D.add(mesh);
          layerMeshes.push(mesh);
        }
        // 도포/시트형 & 구조체형 — 한 판
        else {
          geometry = new THREE.BoxGeometry(floorW, thickness, floorD);
          mesh = new THREE.Mesh(geometry, floorMat);
          mesh.position.y = pos + thickness / 2;
          mesh.castShadow = true;
          mesh.receiveShadow = true;

          const edges = new THREE.EdgesGeometry(geometry);
          const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2, opacity: 0.4, transparent: true }));
          mesh.add(line);

          pos += thickness;
          group3D.add(mesh);
          layerMeshes.push(mesh);
        }
      });

      // 전체 중심 맞추기
      const totalSize = isWall ? wallTotalThickness : pos;
      layerMeshes.forEach(mesh => {
        if (isWall) {
          mesh.position.x -= totalSize / 2;
        } else {
          mesh.position.y -= totalSize / 2;
        }
      });

      // explode용 원래 위치 저장
      explodeProgress = 0;
      layerOriginalY = layerMeshes.map(mesh => isWall ? mesh.position.x : mesh.position.y);

      // 그룹을 scene에 추가
      scene3D.add(group3D);
    }

    // Mouse drag for rotation
    function onMouseDown(e) {
      isDragging = true;
      previousMousePosition = { x: e.clientX, y: e.clientY };
    }

    function onMouseMove(e) {
      if (!isDragging) return;

      const deltaX = e.clientX - previousMousePosition.x;
      const deltaY = e.clientY - previousMousePosition.y;

      // Camera orbit rotation
      camRotY -= deltaX * 0.01;
      camRotX += deltaY * 0.01;
      camRotX = Math.max(-1, Math.min(1, camRotX));

      previousMousePosition = { x: e.clientX, y: e.clientY };
    }

    function onMouseUp() {
      isDragging = false;
    }

    // Mouse wheel zoom
    function onWheel(e) {
      e.preventDefault();
      camRadius += e.deltaY * 0.01;
      camRadius = Math.max(1, Math.min(10, camRadius));
    }

    // Category filter rendering
    function renderCategoryFilters() {
      const filterContainer = document.querySelector('.material-filters');

      // Ceiling: All/Structural/Finishing
      if (structureType === 'ceiling') {
        filterContainer.innerHTML = `
          <button class="filter-btn active" onclick="filterMaterials('all')" data-filter="all">
            All
          </button>
          <button class="filter-btn" onclick="filterMaterials('Structural')" data-filter="Structural">
            Structural
          </button>
          <button class="filter-btn" onclick="filterMaterials('Finishing')" data-filter="Finishing">
            Finishing
          </button>
        `;
      }
      // Window: All only
      if (structureType === 'window') {
        filterContainer.innerHTML = `
          <button class="filter-btn active" onclick="filterMaterials('all')" data-filter="all">
            All
          </button>
        `;
      }
      // Default filters are already in HTML
    }

    // Initialization
    function init() {
      materials = KOREAN_EPD[structureType]?.materials || [];

      // Probe image extensions (png/jpg)
      materials.forEach(m => { if (m.nameEn) probeImageExt(m.nameEn); });

      // Set default assembly name
      const krName = STRUCTURE_NAME_KR[structureType] || structureType;
      document.getElementById('assemblyName').value = krName + '01';

      // Set navigation active state
      updateNavigation();

      // Render category filters
      renderCategoryFilters();

      // Update filter button visibility
      updateFilterButtons();

      // Initialize 3D
      init3DPreview();

      renderPyramid();
    }

    // Show/hide filter buttons based on structure type
    function updateFilterButtons() {
      const hideFilters = {
        ceiling: ['단열재', '방수재']
      };

      const filtersToHide = hideFilters[structureType] || [];

      document.querySelectorAll('.filter-btn').forEach(btn => {
        const filter = btn.getAttribute('data-filter');
        if (filtersToHide.includes(filter)) {
          btn.style.display = 'none';
        } else {
          btn.style.display = '';
        }
      });
    }

    // Update navigation active state
    function updateNavigation() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const btnType = btn.getAttribute('data-type');
        if (btnType === structureType) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // Pyramid rendering (Denmark absolute value based)
    function renderPyramid() {
      const container = document.getElementById('pyramidTiles');
      const pyramidStage = document.querySelector('.pyramid-stage');

      // Apply category filter
      let filtered = materials;
      if (currentFilter !== 'all') {
        filtered = materials.filter(m => {
          if (currentFilter === 'Structural') {
            return m.categoryName === 'Structural';
          } else if (currentFilter === 'Insulation') {
            return m.categoryName.includes('Insulation');
          } else if (currentFilter === 'Finishing') {
            return ['Finishing', 'Exterior', 'Roofing', 'Ceiling', 'Hanger'].includes(m.categoryName);
          } else if (currentFilter === 'Waterproof') {
            return m.categoryName.includes('Waterproof');
          } else if (currentFilter === 'Frame') {
            return m.categoryName === 'Frame';
          } else if (currentFilter === 'Glass') {
            return m.categoryName === 'Glass';
          }
          return m.categoryName === currentFilter;
        });
      }

      // Sort by GWP
      filtered.sort((a, b) => b.gwp - a.gwp); // Highest first

      // Maintain empty pyramid structure even without materials
      const showEmptyMessage = filtered.length === 0;

      // Row slot configuration
      const rowSlotCounts = structureType === 'floor'
        ? [1, 2, 3, 5, 7, 8, 10, 11, 13, 14, 16]          // 11 rows
        : [1, 2, 3, 4, 6, 7, 8, 10, 12, 14, 16];          // 11 rows (external/internal wall)

      // m2 unit check (ceiling, window)
      const isM2Unit = (structureType === 'ceiling' || structureType === 'window');

      let html = '';

      if (isM2Unit) {
        // === Ceiling/Window: sequential placement (no Level groups) ===
        const filteredSetM2 = new Set(filtered.map(m => m.id));
        const allSorted = [...materials].sort((a, b) => b.gwp - a.gwp);
        let materialIndex = 0;
        rowSlotCounts.forEach((slotCount, rowIndex) => {
          const rowNumber = rowIndex + 1;
          let level;
          if (rowNumber <= 2) level = 1;
          else if (rowNumber <= 5) level = 2;
          else if (rowNumber <= 7) level = 3;
          else if (rowNumber <= 9) level = 4;
          else level = 5;

          const tiles = [];
          for (let i = 0; i < slotCount; i++) {
            const material = allSorted[materialIndex];
            if (material) {
              const isVisible = filteredSetM2.has(material.id);
              const isSelected = selectedLayers.some(l => l.material.id === material.id);
              const imageUrl = getMaterialImageUrl(material);
              const gwpDisplay = material.gwp < 10 ? material.gwp.toFixed(1) : (material.gwp < 0 ? '-' + formatNumber(Math.abs(material.gwp), 0) : formatNumber(material.gwp, 0));

              tiles.push(`
                <div class="tile-wrapper"${!isVisible ? ' style="visibility:hidden;"' : ''}>
                  <div class="material-tile ${isSelected ? 'selected' : ''} level-${level} ${getSourceClass(material.source)}"
                       style="background-image: url('${escapeHtml(imageUrl)}')"
                       tabindex="0"
                       role="button"
                       aria-label="${escapeHtml(material.name)} - GWP: ${gwpDisplay} kgCO₂e/m²"
                       onclick="selectMaterial('${escapeHtml(material.id)}')"
                       onkeypress="if(event.key==='Enter') selectMaterial('${escapeHtml(material.id)}')"
                       data-id="${escapeHtml(material.id)}">
                    <div class="gwp-badge">${gwpDisplay}</div>
                    <div class="level-indicator"></div>
                  </div>
                  <div class="tile-name-below">${escapeHtml(material.name)}</div>
                </div>
              `);
              materialIndex++;
            } else {
              tiles.push(`
                <div class="tile-wrapper" style="visibility:hidden;">
                  <div class="material-tile empty-slot level-${level}"></div>
                  <div class="tile-name-below"></div>
                </div>
              `);
            }
          }

          const levelLastRows = [2, 5, 7, 9];
          const isLevelEnd = levelLastRows.includes(rowNumber);
          const groupEndClass = isLevelEnd ? 'group-end' : '';

          const rowMaxWidth = slotCount * 85 + 15;
          html += `
            <div class="pyramid-row level-${level} row-${rowNumber} ${groupEndClass}" style="max-width:${rowMaxWidth}px">
              ${tiles.join('')}
            </div>
          `;
        });
      } else {
        // === Floor/External Wall/Internal Wall: separate by GWP level ===

        const levelBounds = structureType === 'floor' ? [
          { level: 1, min: 10000, rows: [1, 2] },
          { level: 2, min: 1000,  rows: [3, 4] },
          { level: 3, min: 100,   rows: [5, 6, 7] },
          { level: 4, min: 0,     rows: [8, 9] },
          { level: 5, min: -Infinity, rows: [10, 11] },
        ] : [
          { level: 1, min: 10000, rows: [1, 2, 3] },
          { level: 2, min: 1000,  rows: [4, 5] },
          { level: 3, min: 100,   rows: [6, 7, 8] },
          { level: 4, min: 0,     rows: [9] },
          { level: 5, min: -Infinity, rows: [10, 11] },
        ];

        const groupBoundaryRows = structureType === 'floor' ? [2, 4, 7, 9] : [3, 5, 8, 9];
        const carbonLabels = structureType === 'floor'
          ? { 2: '10,000 kgCO₂e/m³', 4: '1,000 kgCO₂e/m³', 7: '100 kgCO₂e/m³', 9: '0 kgCO₂e/m³' }
          : { 3: '10,000 kgCO₂e/m³', 5: '1,000 kgCO₂e/m³', 8: '100 kgCO₂e/m³', 9: '0 kgCO₂e/m³'};

        const filteredSet = new Set(filtered.map(m => m.id));
        const levelMaterials = { 1: [], 2: [], 3: [], 4: [], 5: [] };
        materials.forEach(m => {
          if (m.gwp >= 10000) levelMaterials[1].push(m);
          else if (m.gwp >= 1000) levelMaterials[2].push(m);
          else if (m.gwp >= 100) levelMaterials[3].push(m);
          else if (m.gwp >= 0) levelMaterials[4].push(m);
          else levelMaterials[5].push(m);
        });
        Object.values(levelMaterials).forEach(arr => arr.sort((a, b) => b.gwp - a.gwp));

        const rowDataList = [];
        for (let rowIndex = 0; rowIndex < rowSlotCounts.length; rowIndex++) {
          const rowNumber = rowIndex + 1;
          const slotCount = rowSlotCounts[rowIndex];
          const level = structureType === 'floor'
            ? (rowNumber <= 2 ? 1 : rowNumber <= 4 ? 2 : rowNumber <= 7 ? 3 : rowNumber <= 9 ? 4 : 5)
            : (rowNumber <= 3 ? 1 : rowNumber <= 5 ? 2 : rowNumber <= 8 ? 3 : rowNumber <= 9 ? 4 : 5);

          const tiles = [];
          let hasContent = false;
          for (let i = 0; i < slotCount; i++) {
            const material = levelMaterials[level].shift();
            if (material) {
              const isVisible = filteredSet.has(material.id);
              if (isVisible) hasContent = true;
              const isSelected = selectedLayers.some(l => l.material.id === material.id);
              const imageUrl = getMaterialImageUrl(material);

              tiles.push(`
                <div class="tile-wrapper"${!isVisible ? ' style="visibility:hidden;"' : ''}>
                  <div class="material-tile ${isSelected ? 'selected' : ''} level-${level} ${getSourceClass(material.source)}"
                       style="background-image: url('${escapeHtml(imageUrl)}')"
                       tabindex="0"
                       role="button"
                       aria-label="${escapeHtml(material.name)} - GWP: ${formatNumber(material.gwp, 0)} kgCO₂e/m³"
                       onclick="selectMaterial('${escapeHtml(material.id)}')"
                       onkeypress="if(event.key==='Enter') selectMaterial('${escapeHtml(material.id)}')"
                       data-id="${escapeHtml(material.id)}">
                    <div class="gwp-badge">${material.gwp < 0 ? '-' + formatNumber(Math.abs(material.gwp), 0) : formatNumber(material.gwp, 0)}</div>
                    <div class="level-indicator"></div>
                  </div>
                  <div class="tile-name-below">${escapeHtml(material.name)}</div>
                </div>
              `);
            } else {
              tiles.push(`
                <div class="tile-wrapper" style="visibility:hidden;">
                  <div class="material-tile empty-slot level-${level}"></div>
                  <div class="tile-name-below"></div>
                </div>
              `);
            }
          }

          const isBoundary = groupBoundaryRows.includes(rowNumber);
          rowDataList.push({ rowNumber, slotCount, level, tiles, hasContent, isBoundary, carbonLabelText: isBoundary ? carbonLabels[rowNumber] : '' });
        }

        for (const rd of rowDataList) {
          const rowMaxWidth = rd.slotCount * 85 + 15;
          const labelLineWidth = (rd.level === 1 && structureType !== 'external') ? 50 : 80;
          const carbonLabel = rd.isBoundary && rd.carbonLabelText ? `<span class="carbon-label" style="left:50%;transform:translateX(-50%);right:auto;bottom:0px;--line-w:${labelLineWidth}px">${rd.carbonLabelText}</span>` : '';
          const tightBoundary = rd.isBoundary && rd.level === 1 && structureType !== 'external';
          html += `
            <div class="pyramid-row level-${rd.level} row-${rd.rowNumber} ${rd.isBoundary ? 'group-end' : ''}" style="max-width:${rowMaxWidth}px${tightBoundary ? ';padding-bottom:15px;margin-bottom:5px' : ''}">
              ${rd.tiles.join('')}
              ${carbonLabel}
            </div>
          `;
        }
      }

      container.innerHTML = html;

      // Show message overlay if no materials
      if (showEmptyMessage) {
        container.insertAdjacentHTML('beforeend', '<div class="empty-materials-overlay">No materials in this category</div>');
      }

      // Update selection state
      updateMaterialCards();

      // Mark pyramid as loaded
      requestAnimationFrame(() => {
        pyramidStage.classList.add('loaded');
      });
    }

    // Update material card selection state
    function updateMaterialCards() {
      document.querySelectorAll('.material-tile').forEach(tile => {
        const materialId = tile.getAttribute('data-id');
        const isSelected = selectedLayers.some(l => l.material.id === materialId);

        if (isSelected) {
          tile.classList.add('selected');
        } else {
          tile.classList.remove('selected');
        }
      });
    }

    // Select material
    function selectMaterial(materialId) {
      const material = materials.find(m => m.id === materialId);
      if (!material) return;

      // Default thickness: use from material DB if available, otherwise 100mm
      const defaultThickness = material.thickness || 100;

      // Window: select only 1 (replace)
      if (structureType === 'window') {
        selectedLayers = [{ material, thickness: defaultThickness, id: Date.now() }];
      } else {
        selectedLayers.push({
          material: material,
          thickness: defaultThickness,
          id: Date.now()
        });
      }

      updateSelectedLayers();
      updateTotalCarbon();
      updateMaterialCards();
      update3DLayers();
    }

    // Update selected layers
    function updateSelectedLayers() {
      const container = document.getElementById('selectedLayers');

      if (selectedLayers.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📦</div>
            <p>Click a material to<br>add a layer</p>
          </div>
        `;
        return;
      }

      container.innerHTML = selectedLayers.map((layer, index) => {
        const carbon = calculator.calculateLayerCarbon(layer.material, layer.thickness, 1);
        const matUnit = String(layer.material.unit || '').toLowerCase();
        const isM2 = matUnit.includes('m²') || matUnit.includes('m2');

        const isFixed = layer.material.hideThickness === true;

        const thicknessHtml = isM2 ? `
            <div class="thickness-input">
              <label>Area unit (m²)</label>
            </div>
        ` : isFixed ? '' : `
            <div class="thickness-input">
              <label>Thickness:</label>
              <input
                type="number"
                value="${layer.thickness}"
                min="1"
                step="1"
                onchange="updateThickness(${layer.id}, this.value)"
              >
              <span>mm</span>

            </div>
        `;

        return `
          <div class="layer-item">
            <div class="layer-header">
              <span class="layer-name">${index + 1}. ${escapeHtml(layer.material.name)}${layer.material.tip ? `<span class="thickness-tip-icon">i
                <div class="thickness-tip">${escapeHtml(layer.material.tip)}</div>
              </span>` : ''}</span>
              <button class="remove-btn" onclick="removeLayer(${layer.id})">✕</button>
            </div>
            ${thicknessHtml}
            <div class="carbon-info">
              Carbon: ${formatNumber(carbon, 2)} kg CO₂eq/m²
            </div>
          </div>
        `;
      }).join('');
    }

    // Remove layer
    function removeLayer(layerId) {
      selectedLayers = selectedLayers.filter(l => l.id !== layerId);
      updateSelectedLayers();
      updateTotalCarbon();
      updateMaterialCards();
      update3DLayers();
    }

    // Update thickness
    function updateThickness(layerId, thickness) {
      const layer = selectedLayers.find(l => l.id === layerId);
      if (layer) {
        layer.thickness = parseFloat(thickness);
        updateSelectedLayers();
        updateTotalCarbon();
        update3DLayers();
      }
    }

    // Update total carbon emissions
    function updateTotalCarbon() {
      const total = calculator.calculateAssemblyCarbon(selectedLayers, 1);
      document.getElementById('totalCarbon').textContent = formatNumber(total, 2);
    }

    // Filtering
    function filterMaterials(filter) {
      currentFilter = filter;

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-filter="${filter}"]`).classList.add('active');

      renderPyramid();
    }

    // Clear layers
    function clearLayers() {
      if (selectedLayers.length === 0) return;

      if (confirm('Reset all layers?')) {
        selectedLayers = [];
        updateSelectedLayers();
        updateTotalCarbon();
        updateMaterialCards();
        update3DLayers();
      }
    }

    // Save 3D high-resolution image
    function save3DImage(separated) {
      if (!renderer3D || !scene3D || !camera3D || layerMeshes.length === 0) return;
      const scale = 4;
      const container = document.getElementById('preview3D');
      const w = container.clientWidth;
      const h = 250;

      const savedProgress = explodeProgress;
      if (separated) {
        explodeProgress = 1;
      } else {
        explodeProgress = 0;
      }
      const explodeGapSave = 0.1;
      if (layerOriginalY.length === layerMeshes.length && layerMeshes.length > 1) {
        const isWall = (structureType === 'external' || structureType === 'internal');
        const isCeil = (structureType === 'ceiling');
        const dir = isCeil ? -1 : 1;
        layerMeshes.forEach((mesh, i) => {
          const offset = (i - (layerMeshes.length - 1) / 2) * explodeGapSave * explodeProgress * dir;
          if (isWall) {
            mesh.position.x = layerOriginalY[i] + offset;
          } else {
            mesh.position.y = layerOriginalY[i] + offset;
          }
        });
      }

      // Resize to high resolution
      renderer3D.setPixelRatio(1);
      renderer3D.setSize(w * scale, h * scale);
      camera3D.aspect = w / h;
      camera3D.updateProjectionMatrix();
      renderer3D.render(scene3D, camera3D);

      // Download
      const link = document.createElement('a');
      link.download = separated ? 'assembly-separated.png' : 'assembly-all.png';
      link.href = renderer3D.domElement.toDataURL('image/png');
      link.click();

      // Restore original size + state
      explodeProgress = savedProgress;
      renderer3D.setPixelRatio(window.devicePixelRatio);
      renderer3D.setSize(w, h);
      renderer3D.render(scene3D, camera3D);
    }

    // Save assembly
    function saveAssembly() {
      if (selectedLayers.length === 0) {
        alert('Please add a layer.');
        return;
      }

      const name = document.getElementById('assemblyName').value.trim();
      if (!name) {
        alert('Please enter an assembly name.');
        return;
      }
      if (name.length > 100) {
        alert('Assembly name must be 100 characters or less.');
        return;
      }

      const areaInput = document.getElementById('assemblyArea').value;
      const area = parseFloat(areaInput);
      if (isNaN(area) || area <= 0) {
        alert('Area must be a number greater than 0.');
        return;
      }
      if (area > 100000) {
        alert('Area must be 100,000 m² or less.');
        return;
      }

      const assembly = calculator.addAssembly(name, structureType, selectedLayers, area);

      // Save 3D model JSON
      if (group3D) {
        try {
          isSaving3D = true;
          const savedRotX = group3D.rotation.x;
          const savedRotY = group3D.rotation.y;
          const savedRotZ = group3D.rotation.z;
          group3D.rotation.set(0, 0, 0);

          const isWallType = (structureType === 'external' || structureType === 'internal');
          if (layerOriginalY && layerOriginalY.length === layerMeshes.length) {
            layerMeshes.forEach((mesh, i) => {
              if (isWallType) mesh.position.x = layerOriginalY[i];
              else mesh.position.y = layerOriginalY[i];
            });
          }
          explodeProgress = 0;
          exploded = false;

          const sceneJson = group3D.toJSON();

          // Restore rotation
          group3D.rotation.set(savedRotX, savedRotY, savedRotZ);
          isSaving3D = false;
          const stored = JSON.parse(localStorage.getItem('assemblies3D') || '{}');
          stored[assembly.id] = sceneJson;
          localStorage.setItem('assemblies3D', JSON.stringify(stored));
        } catch(e) { console.warn('3D save failed:', e); }
      }

      alert('Assembly saved!');

      if (confirm('Go to assembly comparison page?')) {
        window.location.href = 'assembly-comparison-en.html';
      } else {
        selectedLayers = [];
        document.getElementById('assemblyName').value = '';
        document.getElementById('assemblyArea').value = '1';
        updateSelectedLayers();
        updateTotalCarbon();
        updateMaterialCards();
        update3DLayers();
      }
    }

    init();
  </script>
</body>
</html>
