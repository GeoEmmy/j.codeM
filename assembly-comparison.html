<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어셈블리 비교 - J.codE M</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* 전체 페이지 */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    /* 컨텐츠 컨테이너 */
    .container {
      position: fixed;
      top: 80px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      max-width: none;
      margin: 0;
      padding: 0;
    }

    /* 내부 콘텐츠 래퍼 */
    .content-wrapper {
      padding: 30px 50px;
    }

    /* 메인 네비게이션 */
    .main-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 50px;
      height: 80px;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
      gap: 40px;
    }

    /* 중앙 메뉴 공간 */
    .nav-menu {
      display: flex;
      gap: 8px;
      flex: 1;
      justify-content: center;
      max-width: none;
      margin-right: 230px;
    }

    /* 로고 */
    .nav-brand .brand-link {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -1.5px;
      transition: opacity 0.3s ease;
    }

    .nav-brand .brand-link:hover {
      opacity: 0.7;
    }

    .logo-text {
      color: var(--dark);
    }

    .logo-accent {
      color: var(--primary-color);
    }



    .nav-btn {
      position: relative;
      padding: 10px 28px;
      background: transparent;
      border: none;
      text-decoration: none;
      color: #636e72;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border-radius: 10px;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: var(--primary-color);
      transition: width 0.3s ease;
    }

    .nav-btn:hover {
      color: var(--primary-color);
      background: rgba(0, 184, 148, 0.05);
    }

    .nav-btn:hover::before {
      width: 60%;
    }

    .nav-btn.active {
      color: white;
      background: linear-gradient(135deg, #00b894 0%, #00a281 100%);
      box-shadow: 0 4px 15px rgba(0, 184, 148, 0.25);
    }

    .nav-btn.active::before {
      display: none;
    }

    /* 우측 액션 버튼 */
    .nav-actions {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      padding: 10px 24px;
      background: white;
      border: 1.5px solid #e8ecf1;
      border-radius: 10px;
      text-decoration: none;
      color: #636e72;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .comparison-btn {
      color: var(--primary-color);
      border-color: rgba(0, 184, 148, 0.3);
      background: rgba(0, 184, 148, 0.03);
    }

    .comparison-btn.active {
      color: white;
      background: linear-gradient(135deg, #00b894 0%, #00a281 100%);
      border-color: var(--primary-color);
      box-shadow: 0 4px 15px rgba(0, 184, 148, 0.25);
    }

    .comparison-btn:hover:not(.active) {
      background: var(--primary-color);
      border-color: var(--primary-color);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 184, 148, 0.25);
      transform: translateY(-1px);
    }

    .home-btn:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: rgba(0, 184, 148, 0.03);
      transform: translateY(-1px);
    }

    /* 반응형 - 태블릿 */
    @media (max-width: 1024px) {
      .main-nav {
        padding: 16px 30px;
        gap: 25px;
      }

      .nav-btn {
        padding: 9px 22px;
        font-size: 14px;
      }

      .action-btn {
        padding: 9px 20px;
        font-size: 13px;
      }

      .nav-brand .brand-link {
        font-size: 23px;
      }
    }

    /* 반응형 - 모바일 */
    @media (max-width: 768px) {
      .main-nav {
        padding: 14px 20px;
        gap: 15px;
      }

      .nav-btn {
        padding: 8px 16px;
        font-size: 13px;
      }

      .action-btn {
        padding: 8px 16px;
        font-size: 12px;
      }

      .nav-brand .brand-link {
        font-size: 20px;
      }

      .nav-menu {
        gap: 6px;
      }

      .nav-actions {
        gap: 8px;
      }
    }

    /* 더 작은 모바일 */
    @media (max-width: 480px) {
      .main-nav {
        padding: 12px 15px;
        gap: 10px;
      }

      .nav-btn {
        padding: 7px 12px;
        font-size: 12px;
      }

      .action-btn {
        padding: 7px 12px;
        font-size: 11px;
      }
    }

    /* 통계 카드 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .stat-card .icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .stat-card .label {
      font-size: 12px;
      color: #636e72;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--dark);
    }

    .stat-card .unit {
      font-size: 12px;
      color: #b2bec3;
      margin-top: 5px;
    }

    /* 어셈블리 리스트 */
    .assemblies-section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 24px;
      font-weight: 700;
    }

    .section-header .actions {
      display: flex;
      gap: 10px;
    }

    .assemblies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .assembly-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: var(--shadow);
      transition: var(--transition);
      position: relative;
      border-left: none; /* 5px solid var(--primary-color); */
    }

    .assembly-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .assembly-card .preview-3d-small {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-radius: 10px;
      margin-bottom: 15px;
      position: relative;
      overflow: hidden;
    }

    .assembly-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
    }

    .assembly-card .assembly-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .assembly-card .assembly-type {
      font-size: 12px;
      color: #636e72;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .assembly-card .carbon-display-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }

    .assembly-card .carbon-display {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .assembly-card .carbon-display.total {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    }

    .assembly-card .carbon-display .label {
      font-size: 11px;
      opacity: 0.85;
      margin-bottom: 5px;
    }

    .assembly-card .carbon-display .value {
      font-size: 24px;
      font-weight: 700;
    }

    .assembly-card .carbon-display .unit {
      font-size: 11px;
      margin-top: 5px;
      opacity: 0.9;
    }

    .assembly-card .layers-list {
      margin: 15px 0;
    }

    .assembly-card .layer-tag {
      display: inline-block;
      background: var(--bg-light);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      margin: 3px;
      color: #636e72;
    }

    .assembly-card .metadata {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--light-gray);
      font-size: 11px;
      color: #95a5a6;
    }

    .assembly-card .actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }

    .assembly-card .actions button {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }

    /* 비교 차트 */
    .comparison-section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: var(--shadow);
      margin-bottom: 40px;
    }

    .comparison-section h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* 차트 영역 배치 */
    .charts-row {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .charts-row.five-cols .chart-box {
      flex: 1;
      min-width: 0;
    }

    .charts-row.full-width .chart-box {
      width: 100%;
    }

    .chart-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 10px 10px 5px 10px;
    }

    .chart-box-header {
      text-align: center;
      margin-bottom: 3px;
    }

    .chart-box-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
    }

    .chart-container {
      position: relative;
      height: 281px;
      padding-top: 18px;
      overflow: visible;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 248px;
    }

    .charts-row.full-width .bar-chart {
      gap: 15px;
    }

    .bar-item {
      flex: 1;
      max-width: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .bar {
      width: 100%;
      background: linear-gradient(to top, var(--primary-color), var(--secondary-color));
      border-radius: 10px 10px 0 0;
      position: relative;
      transition: var(--transition);
      cursor: pointer;
      min-height: 1px;
    }

    .bar:hover {
      transform: scaleY(1.05);
      box-shadow: 0 -5px 20px rgba(0, 184, 148, 0.3);
    }

    .bar .value-label {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
    }

    .charts-row.five-cols .bar .value-label {
      font-size: 10px;
      top: -16px;
    }

    .bar-label {
      font-size: 12px;
      text-align: center;
      color: #636e72;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .charts-row.five-cols .bar-label {
      font-size: 10px;
    }

    .charts-row.five-cols .bar-item {
      gap: 2px;
    }

    /* 필터/탭 */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      background: white;
      border: 2px solid var(--light-gray);
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
    }

    .tab-btn.active {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }

    .tab-btn:hover {
      border-color: var(--primary-color);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #b2bec3;
    }

    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #636e72;
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 25px;
    }

    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-content h3 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .modal-content .detail-grid {
      display: grid;
      gap: 15px;
    }

    .modal-content .detail-item {
      padding: 15px;
      background: var(--bg-light);
      border-radius: 10px;
    }

    .modal-content .detail-label {
      font-size: 12px;
      color: #636e72;
      margin-bottom: 5px;
    }

    .modal-content .detail-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #636e72;
    }

    @media (max-width: 1200px) {
      .charts-row.five-cols {
        flex-wrap: wrap;
      }

      .charts-row.five-cols .chart-box {
        flex: 1 1 calc(33.33% - 10px);
        min-width: 200px;
      }
    }

    @media (max-width: 768px) {
      .charts-row.five-cols .chart-box {
        flex: 1 1 calc(50% - 10px);
      }

      .assemblies-grid {
        grid-template-columns: 1fr;
      }

      .bar-chart {
        flex-direction: column;
        height: auto;
      }

      .bar-item {
        width: 100%;
        flex-direction: row;
        height: 60px;
      }

      .bar {
        height: 100%;
        width: auto;
        border-radius: 0 10px 10px 0;
      }
    }

    @media (max-width: 480px) {
      .charts-row.five-cols .chart-box {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>
  <!-- 메인 네비게이션 -->
  <nav class="main-nav">
    <!-- 좌측: 로고 -->
    <div class="nav-brand">
      <a href="index.html" class="brand-link">
        <span class="logo-text">J.codE</span>
        <span class="logo-accent">M</span>
      </a>
    </div>

    <!-- 중앙: 빈 공간 (material-selector와 레이아웃 동일하게) -->
    <div class="nav-menu"></div>

    <!-- 우측: 액션 버튼 -->
    <div class="nav-actions">
      <a href="assembly-comparison.html" class="action-btn comparison-btn active">
        어셈블리 비교
      </a>
      <a href="material-selector.html" class="action-btn home-btn">
        자재 선택
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="content-wrapper">
    <!-- 페이지 헤더 -->
    <div class="page-header">
      <h2>어셈블리 비교</h2>
      <p>저장된 어셈블리의 탄소배출량을 비교하고 분석하세요</p>
    </div>

    <!-- 통계 -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- 비교 차트 -->
    <div class="comparison-section" id="comparisonSection">
      <div class="section-header">
        <h3>탄소 배출량 비교</h3>
        <div class="actions">
          <button class="btn btn-secondary" onclick="exportData()">
            📥 CSV 내보내기
          </button>
        </div>
      </div>

      <!-- 첫 번째 행: 구조별 5개 -->
      <div class="charts-row five-cols">
        <div class="chart-box">
          <div class="chart-box-header">
            <span class="chart-box-title">바닥</span>
          </div>
          <div class="chart-container">
            <div class="bar-chart" id="barChartFloor"></div>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-box-header">
            <span class="chart-box-title">외벽</span>
          </div>
          <div class="chart-container">
            <div class="bar-chart" id="barChartExternal"></div>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-box-header">
            <span class="chart-box-title">내벽</span>
          </div>
          <div class="chart-container">
            <div class="bar-chart" id="barChartInternal"></div>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-box-header">
            <span class="chart-box-title">천장마감</span>
          </div>
          <div class="chart-container">
            <div class="bar-chart" id="barChartCeiling"></div>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-box-header">
            <span class="chart-box-title">창호</span>
          </div>
          <div class="chart-container">
            <div class="bar-chart" id="barChartWindow"></div>
          </div>
        </div>
      </div>

      <!-- 두 번째 행: 전체 -->
      <div class="charts-row full-width">
        <div class="chart-box">
          <div class="chart-box-header">
            <span class="chart-box-title">전체</span>
          </div>
          <div class="chart-container">
            <div class="bar-chart" id="barChartAll"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 어셈블리 리스트 -->
    <div class="assemblies-section">
      <div class="section-header">
        <h3>저장된 어셈블리</h3>
        <div class="actions">
          <button class="btn btn-primary" onclick="createNewAssembly()">
            ➕ 새 어셈블리
          </button>
          <button class="btn btn-danger" onclick="clearAllAssemblies()">
            🗑️ 전체 삭제
          </button>
        </div>
      </div>
      <div class="tabs" id="assemblyTabs">
        <button class="tab-btn active" onclick="filterAssemblies('all')">전체</button>
        <button class="tab-btn" onclick="filterAssemblies('floor')">바닥</button>
        <button class="tab-btn" onclick="filterAssemblies('external')">외벽</button>
        <button class="tab-btn" onclick="filterAssemblies('internal')">내벽</button>
        <button class="tab-btn" onclick="filterAssemblies('ceiling')">천장마감</button>
        <button class="tab-btn" onclick="filterAssemblies('window')">창호</button>
      </div>
      <div class="assemblies-grid" id="assembliesGrid"></div>
    </div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()" aria-label="닫기">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="data/epd-korea.js"></script>
  <script src="js/calculator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
          integrity="sha384-C7h9bKdF/Gm5GIiH5DnLF+6T7jSEv4nx4rvQxPX6zCJf+gqDvPvmPZDzOVGOjhRb"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
          integrity="sha512-dLxUelApnYxpLt6K2iomGngnHO83iUvZytA3YjDUCjT0HDOHKXnVYdf3hU4JjM8uEhxf9nD1/ey98U3t2vZ0qQ=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script>
    // XSS 방지를 위한 HTML 이스케이프 함수
    function escapeHtml(text) {
      if (text == null) return '';
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    let currentFilter = 'all';

    // Three.js 리소스 관리를 위한 배열
    const threeResources = [];

    // 초기화
    function init() {
      updateStats();
      renderChart();
      renderAssemblies();
    }

    // 통계 업데이트
    function updateStats() {
      const allAssemblies = calculator.getAllAssemblies();
      const statsGrid = document.getElementById('statsGrid');

      // 총 배출량
      const totalCarbon = allAssemblies.reduce((sum, a) => sum + a.totalCarbon, 0);

      // 타입별 배출량 계산
      const floorCarbon = calculator.getAssembliesByType('floor').reduce((sum, a) => sum + a.totalCarbon, 0);
      const externalCarbon = calculator.getAssembliesByType('external').reduce((sum, a) => sum + a.totalCarbon, 0);
      const internalCarbon = calculator.getAssembliesByType('internal').reduce((sum, a) => sum + a.totalCarbon, 0);
      const ceilingCarbon = calculator.getAssembliesByType('ceiling').reduce((sum, a) => sum + a.totalCarbon, 0);
      const windowCarbon = calculator.getAssembliesByType('window').reduce((sum, a) => sum + a.totalCarbon, 0);

      statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="label">총 배출량</div>
          <div class="value">${formatNumber(totalCarbon, 0)}</div>
          <div class="unit">kg CO₂eq</div>
        </div>
        <div class="stat-card">
          <div class="label">바닥 배출량</div>
          <div class="value">${formatNumber(floorCarbon, 0)}</div>
          <div class="unit">kg CO₂eq</div>
        </div>
        <div class="stat-card">
          <div class="label">외벽 배출량</div>
          <div class="value">${formatNumber(externalCarbon, 0)}</div>
          <div class="unit">kg CO₂eq</div>
        </div>
        <div class="stat-card">
          <div class="label">내벽 배출량</div>
          <div class="value">${formatNumber(internalCarbon, 0)}</div>
          <div class="unit">kg CO₂eq</div>
        </div>
        <div class="stat-card">
          <div class="label">천장 배출량</div>
          <div class="value">${formatNumber(ceilingCarbon, 0)}</div>
          <div class="unit">kg CO₂eq</div>
        </div>
        <div class="stat-card">
          <div class="label">창호 배출량</div>
          <div class="value">${formatNumber(windowCarbon, 0)}</div>
          <div class="unit">kg CO₂eq</div>
        </div>
      `;
    }

    // 단일 차트 렌더링 헬퍼 함수
    function renderSingleChart(containerId, assemblies, emptyMessage, chartHeight = 160) {
      const chartContainer = document.getElementById(containerId);

      if (assemblies.length === 0) {
        chartContainer.innerHTML = `
          <div class="empty-state" style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; font-size: 12px;">
            <div class="icon" style="font-size: 24px;">📊</div>
            <p style="margin: 5px 0; color: #999;">${emptyMessage}</p>
          </div>
        `;
        return;
      }

      // 탄소배출량으로 정렬 (m²당 기준)
      const sorted = [...assemblies].sort((a, b) => {
        const aPerM2 = a.totalCarbon / a.area;
        const bPerM2 = b.totalCarbon / b.area;
        return aPerM2 - bPerM2;
      });

      const maxCarbonPerM2 = Math.max(...sorted.map(a => a.totalCarbon / a.area));

      chartContainer.innerHTML = sorted.map(assembly => {
        const carbonPerM2 = assembly.totalCarbon / assembly.area;
        const heightPx = Math.max(1, (carbonPerM2 / maxCarbonPerM2) * chartHeight);

        return `
          <div class="bar-item">
            <div class="bar" style="height: ${heightPx}px" onclick="showDetail(${assembly.id})">
              <div class="value-label">${formatNumber(carbonPerM2, 0)}</div>
            </div>
            <div class="bar-label">${escapeHtml(assembly.name)}</div>
          </div>
        `;
      }).join('');
    }

    // 차트 렌더링 (6개의 차트)
    function renderChart() {
      const chartHeight = 205;  // 모든 차트 동일 높이

      // 구조별 차트 (5개)
      renderSingleChart('barChartFloor', calculator.getAssembliesByType('floor'), '어셈블리 없음', chartHeight);
      renderSingleChart('barChartExternal', calculator.getAssembliesByType('external'), '어셈블리 없음', chartHeight);
      renderSingleChart('barChartInternal', calculator.getAssembliesByType('internal'), '어셈블리 없음', chartHeight);
      renderSingleChart('barChartCeiling', calculator.getAssembliesByType('ceiling'), '어셈블리 없음', chartHeight);
      renderSingleChart('barChartWindow', calculator.getAssembliesByType('window'), '어셈블리 없음', chartHeight);

      // 전체 차트
      renderSingleChart('barChartAll', calculator.getAllAssemblies(), '어셈블리가 없음', chartHeight);
    }

    // 어셈블리 렌더링
    function renderAssemblies() {
      const assemblies = currentFilter === 'all' 
        ? calculator.getAllAssemblies()
        : calculator.getAssembliesByType(currentFilter);
      
      const grid = document.getElementById('assembliesGrid');
      
      if (assemblies.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; grid-column: 1 / -1;">
            <div class="icon">📦</div>
            <h3>저장된 어셈블리가 없습니다</h3>
            <p>자재 선택 페이지에서 어셈블리를 만들어보세요</p>
            <button class="btn btn-primary" onclick="createNewAssembly()">➕ 새 어셈블리</button>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = assemblies.map(assembly => {
        const carbonPerM2 = assembly.totalCarbon / assembly.area;

        return `
          <div class="assembly-card">
            <div class="preview-3d-small" id="preview3d-${assembly.id}"></div>

            <div class="card-header">
              <div>
                <div class="assembly-name">${escapeHtml(assembly.name)}</div>
                <div class="assembly-type">
                  ${getStructureTypeIcon(assembly.structureType)}
                  ${getStructureTypeName(assembly.structureType)}
                </div>
              </div>
            </div>
            
            <div class="carbon-display-grid">
              <div class="carbon-display">
                <div class="label">m²당 배출량</div>
                <div class="value">${formatNumber(carbonPerM2, 1)}</div>
                <div class="unit">kg CO₂eq/m²</div>
              </div>
              <div class="carbon-display total">
                <div class="label">전체 배출량</div>
                <div class="value">${formatNumber(assembly.totalCarbon, 0)}</div>
                <div class="unit">kg CO₂eq</div>
              </div>
            </div>
            
            <div class="layers-list">
              ${assembly.layers.map(l =>
                `<span class="layer-tag">${escapeHtml(l.material.name)} (${l.thickness}mm)</span>`
              ).join('')}
            </div>
            
            <div class="metadata">
              <span>면적: ${assembly.area.toFixed(2)}m²</span>
              <span>${formatDate(assembly.createdAt)}</span>
            </div>
            
            <div class="actions">
              <button class="btn btn-primary" onclick="showDetail(${assembly.id})">
                상세보기
              </button>
              <button class="btn btn-danger" onclick="deleteAssembly(${assembly.id})">
                삭제
              </button>
            </div>
          </div>
        `;
      }).join('');
      
      // 각 어셈블리의 3D 렌더링
      setTimeout(() => {
        cleanupThreeResources(); // 기존 리소스 정리
        assemblies.forEach(assembly => {
          renderAssembly3D(assembly);
        });
      }, 100);
    }

    // Three.js 리소스 정리 함수
    function cleanupThreeResources() {
      threeResources.forEach(resource => {
        if (resource.animationId) {
          cancelAnimationFrame(resource.animationId);
        }
        if (resource.renderer) {
          resource.renderer.dispose();
        }
        if (resource.scene) {
          resource.scene.traverse(obj => {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
              if (Array.isArray(obj.material)) {
                obj.material.forEach(m => m.dispose());
              } else {
                obj.material.dispose();
              }
            }
          });
        }
      });
      threeResources.length = 0;
    }

    // 어셈블리 3D 렌더링
    function renderAssembly3D(assembly) {
      const container = document.getElementById(`preview3d-${assembly.id}`);
      if (!container) return;

      // 기존 캔버스 제거
      const existingCanvas = container.querySelector('canvas');
      if (existingCanvas) {
        existingCanvas.remove();
      }

      const width = container.clientWidth;
      const height = 150;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

      renderer.setSize(width, height);
      renderer.setClearColor(0x000000, 0);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);

      // 조명 개선
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      
      const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight1.position.set(5, 10, 7);
      directionalLight1.castShadow = true;
      directionalLight1.shadow.camera.near = 0.1;
      directionalLight1.shadow.camera.far = 50;
      scene.add(directionalLight1);
      
      const directionalLight2 = new THREE.DirectionalLight(0x74b9ff, 0.3);
      directionalLight2.position.set(-5, 5, -5);
      scene.add(directionalLight2);
      
      const directionalLight3 = new THREE.DirectionalLight(0xffeaa7, 0.2);
      directionalLight3.position.set(0, -5, 5);
      scene.add(directionalLight3);

      // 자재별 속성 함수
      function getMaterialProps(material) {
        const name = material.name.toLowerCase();
        
        if (name.includes('콘크리트')) {
          return { color: 0x8b8d8f, roughness: 0.9, metalness: 0 };
        }
        if (name.includes('단열') || name.includes('xps') || name.includes('eps') || 
            name.includes('유리면') || name.includes('암면')) {
          return { color: 0xffd93d, roughness: 0.95, metalness: 0, emissive: 0xffd93d, emissiveIntensity: 0.05 };
        }
        if (name.includes('석고')) {
          return { color: 0xf5f5f5, roughness: 0.7, metalness: 0 };
        }
        if (name.includes('마루') || name.includes('목재') || name.includes('스터드') || name.includes('원목')) {
          return { color: 0x8b6f47, roughness: 0.8, metalness: 0 };
        }
        if (name.includes('벽돌') || name.includes('적벽')) {
          return { color: 0xa0522d, roughness: 0.95, metalness: 0 };
        }
        if (name.includes('타일') || name.includes('세라믹')) {
          return { color: 0xe8e8e8, roughness: 0.1, metalness: 0.3, emissive: 0xffffff, emissiveIntensity: 0.05 };
        }
        if (name.includes('모르타르') || name.includes('몰탈') || name.includes('미장')) {
          return { color: 0xb8b8b8, roughness: 0.85, metalness: 0 };
        }
        if (name.includes('방수') || name.includes('아스팔트')) {
          return { color: 0x1a1a1a, roughness: 0.3, metalness: 0.2 };
        }
        if (name.includes('금속') || name.includes('알루미늄') || name.includes('강판')) {
          return { color: 0xc0c0c0, roughness: 0.2, metalness: 0.9, emissive: 0x444444, emissiveIntensity: 0.1 };
        }
        if (name.includes('페인트')) {
          return { color: 0xffffff, roughness: 0.4, metalness: 0, emissive: 0xffffff, emissiveIntensity: 0.05 };
        }
        // 알루미늄 프레임
        if (name.includes('알루미늄') && name.includes('프레임')) {
          return { color: 0x8a8a8a, roughness: 0.2, metalness: 0.95, emissive: 0x333333, emissiveIntensity: 0.1 };
        }
        // PVC 프레임
        if (name.includes('pvc') || name.includes('PVC')) {
          return { color: 0xf5f5f5, roughness: 0.4, metalness: 0, emissive: 0xffffff, emissiveIntensity: 0.02 };
        }
        // 목재 프레임
        if (name.includes('목재') && name.includes('프레임')) {
          return { color: 0x8b6f47, roughness: 0.75, metalness: 0 };
        }
        // 유리
        if (name.includes('유리')) {
          return { color: 0x87CEEB, roughness: 0.05, metalness: 0.1, emissive: 0x87CEEB, emissiveIntensity: 0.05, transparent: true, opacity: 0.4 };
        }
        return { color: 0x00b894, roughness: 0.7, metalness: 0 };
      }

      // 레이어 생성
      const isWindow = (assembly.structureType === 'window');
      const isWall = (assembly.structureType === 'external' || assembly.structureType === 'internal');
      let pos = 0;
      const meshes = [];

      // 모든 레이어를 담을 그룹 생성
      const group = new THREE.Group();

      // 창호일 경우 프레임+유리 형태로 렌더링
      if (isWindow) {
        // 선택한 자재에서 프레임과 유리 찾기
        const frameMaterialLayer = assembly.layers.find(l => l.material.categoryName === '프레임');
        const glassMaterialLayer = assembly.layers.find(l => l.material.categoryName === '유리');

        // 프레임 재질
        const frameColor = frameMaterialLayer ? frameMaterialLayer.material.color : '#636e72';
        const frameMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(frameColor),
          roughness: 0.5,
          metalness: 0.3
        });

        // 유리 재질
        const glassColor = glassMaterialLayer ? glassMaterialLayer.material.color : '#87CEEB';
        const glassMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(glassColor),
          transparent: true,
          opacity: 0.4,
          roughness: 0.1,
          metalness: 0.1
        });

        const frameT = 0.06;  // 프레임 두께
        const frameD = 0.08;  // 프레임 깊이
        const winW = 1.0;     // 창 너비
        const winH = 1.4;     // 창 높이

        // 왼쪽 프레임
        const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(frameT, winH, frameD), frameMat);
        frameLeft.position.x = -winW/2 + frameT/2;
        group.add(frameLeft);

        // 오른쪽 프레임
        const frameRight = new THREE.Mesh(new THREE.BoxGeometry(frameT, winH, frameD), frameMat);
        frameRight.position.x = winW/2 - frameT/2;
        group.add(frameRight);

        // 상단 프레임
        const frameTop = new THREE.Mesh(new THREE.BoxGeometry(winW - frameT*2, frameT, frameD), frameMat);
        frameTop.position.set(0, winH/2 - frameT/2, 0);
        group.add(frameTop);

        // 하단 프레임
        const frameBottom = new THREE.Mesh(new THREE.BoxGeometry(winW - frameT*2, frameT, frameD), frameMat);
        frameBottom.position.set(0, -winH/2 + frameT/2, 0);
        group.add(frameBottom);

        // 유리
        const glass = new THREE.Mesh(new THREE.BoxGeometry(winW - frameT*2, winH - frameT*2, 0.02), glassMat);
        group.add(glass);

        scene.add(group);
        camera.position.set(0, 0.5, 2.5);
        camera.lookAt(0, 0, 0);

        function animate() {
          requestAnimationFrame(animate);
          group.rotation.y += 0.005;
          renderer.render(scene, camera);
        }
        animate();
        return;
      }

      assembly.layers.forEach((layer, index) => {
        const thickness = layer.thickness / 1000; // mm를 m로 변환
        let geometry, mesh;

        // 자재별 속성 가져오기
        const matProps = getMaterialProps(layer.material);

        // 투명도 계산 (유리일 경우 matProps에서 가져옴)
        const isTransparent = matProps.transparent || thickness < 0.05;
        const materialOpacity = matProps.opacity || (thickness < 0.05 ? 0.85 : 1);

        if (isWall) {
          geometry = new THREE.BoxGeometry(thickness, 1.5, 1);
          mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({
            color: matProps.color,
            roughness: matProps.roughness,
            metalness: matProps.metalness,
            emissive: matProps.emissive || 0x000000,
            emissiveIntensity: matProps.emissiveIntensity || 0,
            transparent: isTransparent,
            opacity: materialOpacity
          }));
          mesh.position.x = pos + thickness / 2;
          mesh.castShadow = true;
          mesh.receiveShadow = true;
        } else {
          geometry = new THREE.BoxGeometry(1.5, thickness, 1);
          mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({
            color: matProps.color,
            roughness: matProps.roughness,
            metalness: matProps.metalness,
            emissive: matProps.emissive || 0x000000,
            emissiveIntensity: matProps.emissiveIntensity || 0,
            transparent: isTransparent,
            opacity: materialOpacity
          }));
          mesh.position.y = pos + thickness / 2;
          mesh.castShadow = true;
          mesh.receiveShadow = true;
        }

        // 외곽선 (더 두껍게)
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
          color: 0x000000,
          linewidth: 2,
          opacity: 0.6,
          transparent: true
        }));
        mesh.add(line);

        pos += thickness;
        group.add(mesh);  // scene이 아닌 group에 추가
        meshes.push(mesh);
      });

      // 중심 맞추기
      const totalSize = pos;
      meshes.forEach(mesh => {
        if (isWall) {
          mesh.position.x -= totalSize / 2;
        } else {
          mesh.position.y -= totalSize / 2;
        }
      });

      // 그룹을 scene에 추가
      scene.add(group);

      // 카메라 위치
      if (isWall) {
        camera.position.set(0, 0.8, 3);
      } else {
        camera.position.set(2, 1.5, 2);
      }
      camera.lookAt(0, 0, 0);

      // 애니메이션 - 자동 회전
      const resource = { renderer, scene, animationId: null };
      threeResources.push(resource);

      function animate() {
        resource.animationId = requestAnimationFrame(animate);
        group.rotation.y += 0.003; // 천천히 Y축 회전
        renderer.render(scene, camera);
      }
      animate();
    }

    // 필터링
    function filterAssemblies(type) {
      currentFilter = type;
      
      // 탭 활성화
      document.querySelectorAll('#assemblyTabs .tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      renderAssemblies();
    }

    // 상세 보기
    function showDetail(assemblyId) {
      const assembly = calculator.getAllAssemblies().find(a => a.id === assemblyId);
      if (!assembly) return;
      
      const carbonPerM2 = assembly.totalCarbon / assembly.area;

      const modalContent = document.getElementById('modalContent');
      modalContent.innerHTML = `
        <h3 id="modalTitle">${escapeHtml(assembly.name)}</h3>
        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-label">구조 타입</div>
            <div class="detail-value">
              ${getStructureTypeIcon(assembly.structureType)} 
              ${getStructureTypeName(assembly.structureType)}
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-label">면적</div>
            <div class="detail-value">${assembly.area.toFixed(2)} m²</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">총 탄소 배출량</div>
            <div class="detail-value">${formatNumber(assembly.totalCarbon, 2)} kg CO₂eq</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">단위 면적당 배출량</div>
            <div class="detail-value">${formatNumber(carbonPerM2, 2)} kg CO₂eq/m²</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">생성 날짜</div>
            <div class="detail-value">${formatDate(assembly.createdAt)}</div>
          </div>
        </div>
        
        <h4 style="margin-top: 30px; margin-bottom: 15px;">레이어 구성</h4>
        <div class="detail-grid">
          ${assembly.layers.map((layer, i) => {
            const layerCarbon = calculator.calculateLayerCarbon(layer.material, layer.thickness, assembly.area);
            return `
              <div class="detail-item">
                <div class="detail-label">${i + 1}. ${escapeHtml(layer.material.name)}</div>
                <div class="detail-value">
                  두께: ${layer.thickness}mm | 
                  배출: ${formatNumber(layerCarbon, 2)} kg CO₂eq
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      
      document.getElementById('detailModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('show');
    }

    // 어셈블리 삭제
    function deleteAssembly(assemblyId) {
      if (confirm('이 어셈블리를 삭제하시겠습니까?')) {
        calculator.removeAssembly(assemblyId);
        init();
      }
    }

    // 전체 삭제
    function clearAllAssemblies() {
      if (confirm('모든 어셈블리를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
        calculator.clearAll();
        init();
      }
    }

    // 새 어셈블리 생성
    function createNewAssembly() {
      window.location.href = 'material-selector.html';
    }

    // CSV 내보내기
    function exportData() {
      const csv = calculator.exportToCSV();
      if (!csv) {
        alert('내보낼 데이터가 없습니다.');
        return;
      }
      
      const filename = `jcode-assemblies-${new Date().toISOString().split('T')[0]}.csv`;
      downloadCSV(csv, filename);
      alert('CSV 파일이 다운로드되었습니다.');
    }

    // 모달 외부 클릭 시 닫기
    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target.id === 'detailModal') {
        closeModal();
      }
    });

    // ESC 키로 모달 닫기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const modal = document.getElementById('detailModal');
        if (modal.classList.contains('show')) {
          closeModal();
        }
      }
    });

    // 초기화 실행
    init();
  </script>
</body>
</html>
